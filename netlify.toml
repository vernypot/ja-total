# Teofila — Netlify deployment
# Production: https://teofila.netlify.app
# Docs: NETLIFY_DEPLOY.md

[build]
  base = "frontend"
  command = "npm ci && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--no-audit --no-fund"
  # Optional: baked into build for absolute URLs (defaults in src/config/site.js if unset)
  # VITE_SITE_URL = "https://teofila.netlify.app"

[context.production]
  command = "npm ci && npm run build"

[context.deploy-preview]
  command = "npm ci && npm run build"

# SPA fallback (React Router) — also copied from public/_redirects
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
